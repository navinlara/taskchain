    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #1a202c;
    }
    p {
      margin-bottom: 16px;
      color: #4a5568;
      font-size: 14px;
    }
    label {
      font-size: 13px;
      color: #4a5568;
      display: block;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #cbd5e0;
      font-size: 14px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      background: #4c51bf;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover {
      background: #434190;
    }
    .small {
      font-size: 12px;
      color: #a0aec0;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
